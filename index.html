<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>董婷的浪漫小屋 🌸</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0b0b18;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Segoe UI','Microsoft YaHei',sans-serif;user-select:none;overflow:hidden;}
.wrap{display:flex;gap:12px;align-items:stretch;max-width:1300px;width:100%;padding:10px;}
.room-box{background:#111128;border-radius:18px;padding:12px;box-shadow:0 0 80px rgba(255,140,160,0.12);display:flex;flex-direction:column;align-items:center;position:relative;}
.title{font-size:18px;font-weight:bold;letter-spacing:3px;background:linear-gradient(135deg,#ff9a9e,#fad0c4,#ffecd2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:2px;text-align:center;}
.sub{font-size:10px;color:#c09098;letter-spacing:2px;margin-bottom:6px;text-align:center;}
canvas{border-radius:10px;display:block;cursor:pointer;}
.tip{font-size:9px;color:#665;text-align:center;margin-top:4px;letter-spacing:1px;line-height:1.5;}
.ctrl{background:#111128;border-radius:18px;padding:12px;width:290px;box-shadow:0 0 40px rgba(255,140,160,0.08);display:flex;flex-direction:column;overflow-y:auto;max-height:660px;}
.ctrl h3{text-align:center;color:#ffb3ba;font-size:13px;letter-spacing:3px;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid #1e1e3a;}
.tabs{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px;}
.tab{padding:3px 6px;border:1px solid #1e1e3a;background:transparent;color:#888;border-radius:10px;cursor:pointer;font-size:9.5px;font-weight:bold;transition:all .2s;white-space:nowrap;}
.tab:hover{border-color:#ffb3ba;color:#ffb3ba;}
.tab.on{background:linear-gradient(135deg,#d81b60,#ad1457);color:#fff;border-color:transparent;}
.sec-label{font-size:10px;color:#777;text-align:center;letter-spacing:2px;margin-bottom:4px;}
.opts{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:4px;}
.card{display:flex;flex-direction:column;align-items:center;gap:1px;padding:4px 2px;border:1px solid #1e1e3a;border-radius:8px;cursor:pointer;transition:all .2s;background:#0c0c20;}
.card:hover{border-color:#ffb3ba;transform:translateY(-1px);box-shadow:0 2px 8px rgba(233,30,99,.15);}
.card.sel{border-color:#e91e63;background:#1a0a18;box-shadow:0 1px 8px rgba(233,30,99,.25);}
.card .ico{font-size:17px;line-height:1;}
.card .lbl{font-size:8.5px;color:#aaa;text-align:center;}
.color-row{display:flex;flex-wrap:wrap;gap:4px;justify-content:flex-start;margin-bottom:2px;padding:0 2px;}
.color-cat{font-size:9px;color:#665;width:100%;margin-top:6px;margin-bottom:2px;letter-spacing:1px;padding-left:2px;}
.cdot{width:21px;height:21px;border-radius:50%;cursor:pointer;border:2px solid #2a2a3e;transition:all .2s;box-shadow:0 1px 4px rgba(0,0,0,.3);flex-shrink:0;}
.cdot:hover{transform:scale(1.18);}
.cdot.sel{border-color:#fff;transform:scale(1.22);box-shadow:0 0 0 3px rgba(255,255,255,.12);}
.btns{display:flex;gap:6px;margin-top:auto;padding-top:8px;flex-wrap:wrap;}
.btn{flex:1;min-width:55px;padding:7px;border:none;border-radius:12px;font-size:9.5px;font-weight:bold;cursor:pointer;letter-spacing:1px;transition:all .25s;}
.btn-reset{background:#1e1e3a;color:#888;}
.btn-reset:hover{background:#2a2a4a;}
.btn-rand{background:linear-gradient(135deg,#d81b60,#8e24aa);color:#fff;}
.btn-rand:hover{box-shadow:0 3px 12px rgba(233,30,99,.35);transform:scale(1.03);}
.btn-mood{background:linear-gradient(135deg,#5c6bc0,#7c4dff);color:#fff;}
.btn-mood:hover{box-shadow:0 3px 12px rgba(124,77,255,.4);transform:scale(1.03);}
.ctrl::-webkit-scrollbar{width:3px;}
.ctrl::-webkit-scrollbar-thumb{background:#1e1e3a;border-radius:2px;}

/* 心情弹窗 */
.mood-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .35s;}
.mood-overlay.show{opacity:1;pointer-events:auto;}
.mood-card{background:linear-gradient(180deg,#1a1030,#0f0a20);border:2px solid #7c4dff;border-radius:20px;padding:24px 28px;text-align:center;box-shadow:0 0 60px rgba(124,77,255,.2);max-width:400px;width:92%;}
.mood-card h2{color:#d1c4e9;font-size:16px;letter-spacing:2px;margin-bottom:14px;}
.mood-emojis{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:12px;}
.mood-emoji{font-size:32px;padding:8px 14px;border:1px solid #2a2a4e;border-radius:14px;cursor:pointer;background:#0c0c20;transition:all .2s;}
.mood-emoji:hover{border-color:#7c4dff;transform:scale(1.15);box-shadow:0 0 16px rgba(124,77,255,.3);}
.mood-response{margin-top:8px;color:#b39ddb;font-size:13px;letter-spacing:2px;line-height:2;min-height:36px;transition:all .4s;}
.mood-close{display:inline-block;color:#555;font-size:10px;cursor:pointer;margin-top:10px;letter-spacing:1px;}
.mood-close:hover{color:#998;}

/* ===== 衣柜弹窗 ===== */
.wardrobe-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .35s;}
.wardrobe-overlay.show{opacity:1;pointer-events:auto;}
.wardrobe-panel{
  background:linear-gradient(180deg,#2a1038,#1a0a28);border:3px solid #e91e63;
  border-radius:22px;padding:16px 20px;max-width:620px;width:96%;max-height:85vh;
  box-shadow:0 0 80px rgba(233,30,99,.35),0 0 0 8px rgba(233,30,99,.08);
  text-align:center;position:relative;
}
.wardrobe-panel h2{color:#f8bbd0;font-size:15px;letter-spacing:3px;margin-bottom:10px;}
.wardrobe-panel h2 span{font-size:22px;}
.wardrobe-main{display:flex;gap:14px;align-items:flex-start;}
.wardrobe-mirror{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:6px;}
.mirror-frame{
  position:relative;border:6px solid #d4a574;border-radius:16px;
  box-shadow:inset 0 0 30px rgba(255,200,220,.15),0 0 30px rgba(233,30,99,.2);
  background:linear-gradient(180deg,#fef5f8,#fce4ec);
  overflow:hidden;line-height:0;
}
.mirror-frame canvas{display:block;}
.mirror-sparkle{
  position:absolute;top:8px;right:12px;font-size:20px;
  animation:sparklePulse 1.5s ease-in-out infinite;pointer-events:none;
}
@keyframes sparklePulse{0%,100%{opacity:.3;transform:scale(.8);}50%{opacity:1;transform:scale(1.2);}}
.mirror-label{font-size:10px;color:#c090a0;letter-spacing:2px;}
.ootd-display{font-size:11px;color:#f8bbd0;letter-spacing:1px;line-height:1.6;min-height:18px;max-width:180px;text-align:center;}
.btn-ootd{
  padding:6px 16px;font-size:10px;font-family:inherit;letter-spacing:2px;
  color:#fff;background:linear-gradient(135deg,#e91e63,#9c27b0);
  border:none;border-radius:12px;cursor:pointer;transition:all .2s;
}
.btn-ootd:hover{box-shadow:0 3px 14px rgba(233,30,99,.4);transform:scale(1.05);}
.wardrobe-items-scroll{flex:1;max-height:62vh;overflow-y:auto;padding-right:4px;}
.wardrobe-items-scroll::-webkit-scrollbar{width:3px;}
.wardrobe-items-scroll::-webkit-scrollbar-thumb{background:rgba(233,30,99,.2);border-radius:2px;}
.wardrobe-cat{font-size:10px;color:#c090a0;letter-spacing:2px;margin:8px 0 4px;border-top:1px solid rgba(233,30,99,.15);padding-top:6px;}
.wardrobe-items{display:flex;flex-wrap:wrap;gap:5px;justify-content:flex-start;}
.wardrobe-item{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:7px 6px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  border-radius:12px;cursor:pointer;transition:all .25s;min-width:56px;
}
.wardrobe-item:hover{background:rgba(233,30,99,.15);border-color:#e91e63;transform:translateY(-2px);box-shadow:0 4px 12px rgba(233,30,99,.2);}
.wardrobe-item .w-emoji{font-size:28px;line-height:1.1;transition:transform .3s;}
.wardrobe-item:hover .w-emoji{transform:scale(1.2) rotate(-5deg);}
.wardrobe-item .w-name{font-size:9px;color:#ccc;letter-spacing:1px;}
.wardrobe-item .w-color{width:10px;height:10px;border-radius:50%;border:1.5px solid rgba(255,255,255,.2);margin-top:1px;}
.wardrobe-close{display:inline-block;color:#666;font-size:10px;cursor:pointer;margin-top:8px;letter-spacing:1px;}
.wardrobe-close:hover{color:#e91e63;}
.wardrobe-panel::-webkit-scrollbar{width:3px;}
.wardrobe-panel::-webkit-scrollbar-thumb{background:rgba(233,30,99,.2);border-radius:2px;}

/* ===== 猫咪聊天弹窗 ===== */
.cat-overlay{position:fixed;inset:0;z-index:210;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
.cat-overlay.show{opacity:1;pointer-events:auto;}
.cat-bubble{background:linear-gradient(180deg,#2d1840,#1a0a28);border:3px solid #ffb3ba;border-radius:24px;padding:22px 28px;max-width:360px;width:90%;box-shadow:0 0 60px rgba(255,179,186,.3);text-align:center;position:relative;}
.cat-bubble::before{content:'🐱';position:absolute;top:-42px;left:50%;transform:translateX(-50%);font-size:52px;animation:catBounce .6s ease-in-out infinite alternate;}
@keyframes catBounce{from{transform:translateX(-50%) translateY(0);}to{transform:translateX(-50%) translateY(-10px);}}
.cat-bubble h2{color:#ffb3ba;font-size:15px;letter-spacing:2px;margin:14px 0 10px;}
.cat-emoji-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:8px;}
.cat-emoji-btn{font-size:30px;padding:8px 12px;border:1px solid rgba(255,179,186,.2);border-radius:14px;cursor:pointer;background:transparent;transition:all .2s;}
.cat-emoji-btn:hover{border-color:#ffb3ba;transform:scale(1.18);box-shadow:0 0 14px rgba(255,179,186,.25);}
.cat-reply{font-size:13px;color:#e0c0d0;letter-spacing:2px;line-height:1.9;min-height:28px;}
.cat-close{display:inline-block;color:#665;font-size:10px;cursor:pointer;margin-top:8px;letter-spacing:1px;}
.cat-close:hover{color:#ffb3ba;}
</style>
</head>
<body>

<div class="mood-overlay" id="moodOverlay">
  <div class="mood-card">
    <h2>📝 董婷，现在心情怎么样？</h2>
    <div class="mood-emojis" id="moodEmojis"></div>
    <div class="mood-response" id="moodResponse"></div>
    <span class="mood-close" onclick="closeMood()">✨ 点我关闭 ✨</span>
  </div>
</div>

<div class="wardrobe-overlay" id="wardrobeOverlay">
  <div class="wardrobe-panel">
    <h2><span>👑</span> 董婷的梦幻衣橱 <span>👑</span></h2>
    <div class="wardrobe-main">
      <!-- 左侧：换装镜 -->
      <div class="wardrobe-mirror">
        <div class="mirror-frame">
          <canvas id="mirrorCanvas" width="180" height="280"></canvas>
          <div class="mirror-sparkle" id="mirrorSparkle">✨</div>
        </div>
        <div class="mirror-label">🪞 试衣镜</div>
        <div class="ootd-display" id="ootdDisplay">👆 选衣服试穿吧~</div>
        <button class="btn-ootd" onclick="randomOutfit()">🎲 一键搭配</button>
      </div>
      <!-- 右侧：衣物选择 -->
      <div class="wardrobe-items-scroll" id="wardrobeContent"></div>
    </div>
    <span class="wardrobe-close" onclick="closeWardrobe()">✨ 关上衣橱 ✨</span>
  </div>
</div>

<div class="cat-overlay" id="catOverlay">
  <div class="cat-bubble">
    <h2>🐱 喵~ 董婷今天开心吗？</h2>
    <div class="cat-emoji-row" id="catEmojiRow"></div>
    <div class="cat-reply" id="catReply"></div>
    <span class="cat-close" onclick="closeCatChat()">🐾 蹭蹭你 ~ 喵</span>
  </div>
</div>

<div class="wrap">
<div class="room-box">
  <div class="title">🌸 董婷的浪漫小屋 🌸</div>
  <div class="sub">💖 Healing Room · 治愈你的每一天</div>
  <canvas id="c" width="900" height="560"></canvas>
  <div class="tip">🖱️ 点击房间撒花瓣 · 鼠标移动飘爱心<br>📝 点击衣柜打开衣橱👗 · 点小猫聊天🐱 · 黑板写心情 · 右侧面板改造房间</div>
</div>
<div class="ctrl" id="ctrl">
  <h3>🎨 改造面板</h3>
  <div class="tabs" id="tabs"></div>
  <div class="sec-label" id="secLabel">选择风格</div>
  <div id="optArea" style="flex:1;"></div>
  <div class="btns">
    <button class="btn btn-mood" onclick="openMood()">📝 心情</button>
    <button class="btn btn-reset" onclick="resetAll()">🔄 默认</button>
    <button class="btn btn-rand" onclick="randomAll()">🎲 随机</button>
  </div>
</div>
</div>

<script>
const C=document.getElementById('c'),ctx=C.getContext('2d');
const W=C.width,H=C.height,FL=H-100;
let T=0,pt=[],sp=[],hr=[],fx=[],ds=[],rainDrops=[],snowFlakes=[];

// ============ 房间状态 ============
let R={
  wallC:'#fdf5f0',wallPtn:'floral',
  floorT:'wood_light',
  ceilS:'plain',
  curtS:'elegant',curtC:'#fdf0f0',
  lightS:'crystal',
  bedS:'romantic',bedQC:'#fce4ec',bedSC:'#fff',
  wardS:'cream',wardC:'#f5ebe0',
  rugS:'round_floral',
  wallDec:'wreaths',
  flowerC:'pink',flowerN:'many',
  winOpen:false,weather:'starry',
  mood:'😊',moodMsg:'',
};
const DEF=JSON.parse(JSON.stringify(R));

// ============ 36种墙壁颜色 (5大类) ============
const WALL_COLOR_GROUPS = [
  {name:'暖白系',cols:['#fdf5f0','#fefaf5','#fdfaf6','#fef9f0','#faf6f0','#fefdf9','#faf5f0','#fefaf7']},
  {name:'粉色系',cols:['#fce4ec','#f8bbd0','#fce0e6','#fef0f0','#fff5f5','#fbe9e7','#fdf0f5','#ffebee']},
  {name:'奶油系',cols:['#fef8e8','#fdf3e0','#faf0e0','#fef5e7','#fff8f0','#fdf2e9','#faf0e6','#fef9ef']},
  {name:'薰衣草系',cols:['#f5f0ff','#f3e5f5','#ede7f6','#f8f4ff','#e8e0f0','#f0e8f8','#f6f0ff','#ebe0f0']},
  {name:'清新系',cols:['#f0f8ff','#e8f5e9','#f1f8e9','#f9fbe7','#e0f7fa','#eff7fa','#f0faf5','#f5faf0']},
];

// ============ 粒子初始化 ============
function mkPetal(){
  return{x:Math.random()*W,y:-30-Math.random()*200,s:3+Math.random()*7,sp:.3+Math.random()*.7,sw:Math.random()*Math.PI*2,swS:.01+Math.random()*.02,swA:.3+Math.random()*.6,r:Math.random()*Math.PI*2,rS:(Math.random()-.5)*.02,c:['#ffb3ba','#ffc3a0','#ffafbd','#ffd1dc','#fde2e4','#fab1c6'][Math.floor(Math.random()*6)],a:.5+Math.random()*.5};
}
function mkHeart(x,y){return{x,y,vy:-.4-Math.random()*1.4,vx:(Math.random()-.5)*.5,s:3+Math.random()*8,life:1,decay:.005+Math.random()*.012,r:Math.random()*Math.PI*2,rS:(Math.random()-.5)*.03,c:['#ff6b8a','#ff8fab','#ff477e','#ff0a54'][Math.floor(Math.random()*4)]};}
function mkSparkle(){return{x:Math.random()*W,y:Math.random()*H*.45,s:1+Math.random()*2.5,life:1,decay:.003+Math.random()*.008,tw:Math.random()*Math.PI*2,twS:.05+Math.random()*.08};}
function mkRaindrop(){return{x:Math.random()*W,y:-Math.random()*H,s:1+Math.random()*2,vy:3+Math.random()*4,life:1};}
function mkSnowflake(){return{x:Math.random()*W,y:-Math.random()*H,s:1.5+Math.random()*3,vy:.4+Math.random()*.8,vx:(Math.random()-.5)*.5,sw:Math.random()*Math.PI*2,life:1};}

for(let i=0;i<25;i++)pt.push(mkPetal());
for(let i=0;i<30;i++)sp.push(mkSparkle());
for(let i=0;i<8;i++)ds.push({x:Math.random()*W,y:Math.random()*H,s:.5+Math.random()*1.5,a:.06+Math.random()*.15,vy:-.08-Math.random()*.18,sw:Math.random()*Math.PI*2});
for(let i=0;i<40;i++)rainDrops.push(mkRaindrop());
for(let i=0;i<25;i++)snowFlakes.push(mkSnowflake());

// ============ 颜色工具 ============
function lighten(h,a){let r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);r=Math.min(255,r+Math.round((255-r)*a));g=Math.min(255,g+Math.round((255-g)*a));b=Math.min(255,b+Math.round((255-b)*a));return`rgb(${r},${g},${b})`;}
function darken(h,a){let r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);r=Math.max(0,r-Math.round(r*a));g=Math.max(0,g-Math.round(g*a));b=Math.max(0,b-Math.round(b*a));return`rgb(${r},${g},${b})`;}
function hexToRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function miniFlower(cx,cy,sz,cl){
  ctx.fillStyle=cl;
  for(let i=0;i<5;i++){let a=i/5*Math.PI*2;ctx.beginPath();ctx.arc(cx+Math.cos(a)*sz*.5,cy+Math.sin(a)*sz*.5,sz*.38,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle='#ffe0b2';ctx.beginPath();ctx.arc(cx,cy,sz*.22,0,Math.PI*2);ctx.fill();
}
function heartPath(cx,cy,sz){
  ctx.beginPath();
  ctx.moveTo(cx,cy+sz*.35);
  ctx.bezierCurveTo(cx,cy-sz*.4,cx-sz,cy-sz*.5,cx-sz,cy+sz*.2);
  ctx.bezierCurveTo(cx-sz,cy+sz*.8,cx,cy+sz,cx,cy+sz);
  ctx.bezierCurveTo(cx,cy+sz,cx+sz,cy+sz*.8,cx+sz,cy+sz*.2);
  ctx.bezierCurveTo(cx+sz,cy-sz*.5,cx,cy-sz*.4,cx,cy+sz*.35);
}
function flowerBush(cx,cy,sz,ct){
  let pal=ct==='pink'?['#ff6b8a','#ff8fab','#ffb3ba','#ff477e','#ffd1dc','#fab1c6']:
          ct==='red'?['#e63946','#d62828','#c1121f','#780000','#e63946','#ff4d4d']:
          ct==='purple'?['#b39ddb','#ce93d8','#ab47bc','#9c27b0','#e1bee7','#ba68c8']:
          ['#ff6b8a','#ffb3ba','#ce93d8','#ff8fab','#ffe0b2','#fab1c6'];
  for(let i=0;i<8;i++){let a=i/8*Math.PI*2,d=sz*(.3+Math.random()*.7);ctx.fillStyle=pal[i];ctx.beginPath();ctx.arc(cx+Math.cos(a)*d,cy+Math.sin(a)*d-Math.random()*8,5+Math.random()*4,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle='#a8d8a0';
  for(let i=0;i<4;i++){ctx.beginPath();ctx.ellipse(cx-7+i*4.5,cy+5,4,7,.3,0,Math.PI*2);ctx.fill();}
}

// ============ 天花板 ============
function drawCeiling(){
  let st={plain:['#fef9f0','#fdf5e6','#faf0e6'],white:['#fff','#fafafa','#f5f5f5'],cream:['#fef8f0','#fdf4e5','#faf0e0'],floral:['#fef5f5','#fdf0f0','#faeaea']};
  let cl=st[R.ceilS]||st.plain;
  let g=ctx.createLinearGradient(0,0,0,65);
  g.addColorStop(0,cl[0]);g.addColorStop(.5,cl[1]);g.addColorStop(1,cl[2]);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,65);
  ctx.strokeStyle='rgba(200,175,165,.12)';ctx.lineWidth=.6;
  for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(0,7+i*14);ctx.lineTo(W,7+i*14);ctx.stroke();}
  if(R.flowerN!=='none'){
    for(let i=0;i<5;i++){let fx=100+i*185;ctx.globalAlpha=.4;miniFlower(fx,34,13,R.flowerC==='pink'?'#ffb3ba':R.flowerC==='red'?'#e63946':R.flowerC==='purple'?'#ce93d8':'#ffb3ba');ctx.globalAlpha=1;}
  }
}

// ============ 墙壁 (适配36色) ============
function drawWalls(){
  let g=ctx.createLinearGradient(0,65,0,H);
  g.addColorStop(0,R.wallC);g.addColorStop(.3,R.wallC);g.addColorStop(1,lighten(R.wallC,.03));
  ctx.fillStyle=g;ctx.fillRect(0,65,W,H-65);
  if(R.wallPtn!=='none'){
    ctx.globalAlpha=R.wallPtn==='bold'?.055:.025;
    let[r1,g1,b1]=hexToRgb(R.wallC);
    let patCl=`rgb(${Math.max(0,r1-30)},${Math.max(0,g1-15)},${Math.max(0,b1-10)})`;
    for(let y=80;y<FL-15;y+=52){
      for(let x=22;x<W;x+=70){
        miniFlower(x,y,20,patCl);
      }
    }
    ctx.globalAlpha=1;
  }
}

// ============ 地板 ============
function drawFloor(){
  let fm={wood_light:['#e8d5c8','#dcc8b8','#d4bfae','#c4a890'],wood_dark:['#5c3a2a','#4a2a1a','#3a1e12','#2e160e'],wood_warm:['#d4a574','#c8956a','#b88560','#a07550'],marble:['#f5f0eb','#ede5dd','#e5dcd2','#ddd4ca'],tile_white:['#f8f8f8','#f0f0f0','#e8e8e8','#e0e0e0'],carpet_pink:['#fce4ec','#f8d0dc','#f4c0cc','#f0b8c4'],parquet:['#c8956a','#b88560','#a87558','#c8956a']};
  let cl=fm[R.floorT]||fm.wood_light;
  let g=ctx.createLinearGradient(0,FL,0,H);
  g.addColorStop(0,cl[0]);g.addColorStop(.15,cl[1]);g.addColorStop(.5,cl[2]);g.addColorStop(1,cl[3]);
  ctx.fillStyle=g;ctx.fillRect(0,FL,W,H-FL);
  if(R.floorT.startsWith('wood')||R.floorT==='parquet'){
    ctx.strokeStyle='rgba(0,0,0,.08)';ctx.lineWidth=.6;
    for(let y=FL+10;y<H;y+=18){ctx.beginPath();ctx.moveTo(0,y);for(let x=0;x<W;x+=45)ctx.lineTo(x+45,y+Math.sin(x*.005+y*.06)*2.2);ctx.stroke();}
  }
  ctx.fillStyle=darken(cl[0],.15);ctx.fillRect(0,FL-5,W,8);
  let sg=ctx.createLinearGradient(0,FL-5,0,FL+15);
  sg.addColorStop(0,'rgba(0,0,0,.06)');sg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=sg;ctx.fillRect(0,FL-5,W,20);
}

// ============ 窗户开关动画进度 ============
let _winAnim = 0; // 0=closed, 1=open
function getWinProgress(){
  let target = R.winOpen ? 1 : 0;
  _winAnim += (target - _winAnim) * 0.08;
  if(Math.abs(target - _winAnim) < 0.001) _winAnim = target;
  return _winAnim;
}

// ============ 窗户 + 天气系统 ============
function drawWindow(){
  let wx=300,wy=115,ww=300,wh=200;
  let openP = getWinProgress(); // 0→1 平滑过渡

  // === 裁剪到窗内区域 ===
  ctx.save();
  ctx.beginPath();ctx.roundRect(wx+2,wy+2,ww-4,wh-4,1);ctx.clip();

  // --- 窗外天气 ---
  if(R.weather==='sunny'){
    let sg=ctx.createLinearGradient(wx,wy,wx,wy+wh);
    sg.addColorStop(0,'#87ceeb');sg.addColorStop(.5,'#b0e0f0');sg.addColorStop(1,'#d4eff8');
    ctx.fillStyle=sg;ctx.fillRect(wx,wy,ww,wh);
    let sunX=wx+ww-50,sunY=wy+30;
    let sunG=ctx.createRadialGradient(sunX,sunY,16,sunX,sunY,50);
    sunG.addColorStop(0,'rgba(255,240,100,.9)');sunG.addColorStop(.5,'rgba(255,220,80,.3)');sunG.addColorStop(1,'rgba(255,200,60,0)');
    ctx.fillStyle=sunG;ctx.beginPath();ctx.arc(sunX,sunY,50,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fffde0';ctx.beginPath();ctx.arc(sunX,sunY,22,0,Math.PI*2);ctx.fill();
    function cloud(cx,cy,s){ctx.fillStyle='rgba(255,255,255,.85)';ctx.beginPath();ctx.arc(cx,cy,s*.5,0,Math.PI*2);ctx.arc(cx+s*.3,cy-s*.1,s*.35,0,Math.PI*2);ctx.arc(cx-s*.35,cy+s*.05,s*.3,0,Math.PI*2);ctx.arc(cx+s*.15,cy+s*.2,s*.25,0,Math.PI*2);ctx.fill();}
    cloud(wx+55,wy+50,28);cloud(wx+140,wy+25,24);cloud(wx+200,wy+60,20);
  }else if(R.weather==='rainy'){
    let sg=ctx.createLinearGradient(wx,wy,wx,wy+wh);
    sg.addColorStop(0,'#5a6a7a');sg.addColorStop(.6,'#7a8a9a');sg.addColorStop(1,'#8a9aaa');
    ctx.fillStyle=sg;ctx.fillRect(wx,wy,ww,wh);
    ctx.fillStyle='rgba(100,110,120,.45)';
    ctx.beginPath();ctx.arc(wx+70,wy+30,35,0,Math.PI*2);ctx.arc(wx+130,wy+20,40,0,Math.PI*2);ctx.arc(wx+190,wy+35,30,0,Math.PI*2);ctx.fill();
  }else if(R.weather==='snowy'){
    let sg=ctx.createLinearGradient(wx,wy,wx,wy+wh);
    sg.addColorStop(0,'#c8d8e8');sg.addColorStop(1,'#e8f0f8');
    ctx.fillStyle=sg;ctx.fillRect(wx,wy,ww,wh);
    ctx.fillStyle='rgba(220,230,240,.35)';
    ctx.beginPath();ctx.arc(wx+60,wy+25,40,0,Math.PI*2);ctx.arc(wx+150,wy+18,35,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#e8eef5';ctx.fillRect(wx,wy+wh-35,ww,40);
    for(let i=0;i<5;i++){ctx.fillStyle='#a0c0d0';ctx.beginPath();ctx.moveTo(wx+10+i*65,wy+wh-40);ctx.lineTo(wx+5+i*65,wy+wh-22);ctx.lineTo(wx+15+i*65,wy+wh-22);ctx.closePath();ctx.fill();}
  }else if(R.weather==='rainbow'){
    let sg=ctx.createLinearGradient(wx,wy,wx,wy+wh);
    sg.addColorStop(0,'#ffe0d0');sg.addColorStop(1,'#ffe8e0');
    ctx.fillStyle=sg;ctx.fillRect(wx,wy,ww,wh);
    let rainbowCols=['#ff6b6b','#ffa502','#ffe66d','#a8e6cf','#6bb5ff','#a29bfe'];
    for(let j=0;j<6;j++){ctx.strokeStyle=rainbowCols[j];ctx.lineWidth=5;ctx.globalAlpha=.5;ctx.beginPath();ctx.arc(wx+ww/2,wy+wh+10,60+j*8,Math.PI,0);ctx.stroke();}
    ctx.globalAlpha=1;
    ctx.fillStyle='#fffde0';ctx.beginPath();ctx.arc(wx+ww-60,wy+35,20,0,Math.PI*2);ctx.fill();
  }else if(R.weather==='sunset'){
    let sg=ctx.createLinearGradient(wx,wy,wx,wy+wh);
    sg.addColorStop(0,'#ff7b54');sg.addColorStop(.4,'#ffb26b');sg.addColorStop(.7,'#ffd56b');sg.addColorStop(1,'#ffe8c0');
    ctx.fillStyle=sg;ctx.fillRect(wx,wy,ww,wh);
    let sunG=ctx.createRadialGradient(wx+ww/2,wy+wh-20,10,wx+ww/2,wy+wh-20,70);
    sunG.addColorStop(0,'rgba(255,140,60,.8)');sunG.addColorStop(1,'rgba(255,140,60,0)');
    ctx.fillStyle=sunG;ctx.beginPath();ctx.arc(wx+ww/2,wy+wh-20,70,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff8c42';ctx.beginPath();ctx.arc(wx+ww/2,wy+wh-20,24,0,Math.PI*2);ctx.fill();
  }else{ // starry
    let sg=ctx.createLinearGradient(wx,wy,wx,wy+wh);
    sg.addColorStop(0,'#1a1a3e');sg.addColorStop(.5,'#2d1b4e');sg.addColorStop(1,'#3a1a4e');
    ctx.fillStyle=sg;ctx.fillRect(wx,wy,ww,wh);
    let mg=ctx.createRadialGradient(wx+ww-55,wy+28,16,wx+ww-55,wy+28,50);
    mg.addColorStop(0,'rgba(255,234,167,.3)');mg.addColorStop(1,'rgba(255,234,167,0)');
    ctx.fillStyle=mg;ctx.beginPath();ctx.arc(wx+ww-55,wy+28,50,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ffeaa7';ctx.beginPath();ctx.arc(wx+ww-55,wy+28,20,0,Math.PI*2);ctx.fill();
    for(let i=0;i<14;i++){
      let sx=wx+10+Math.random()*(ww-20),sy=wy+10+Math.random()*(wh-20);
      let tw=Math.sin(T*.03+i*2.5)*.5+.5;
      ctx.fillStyle=`rgba(255,255,255,${.25+tw*.75})`;
      ctx.beginPath();ctx.arc(sx,sy,.5+tw*1.3,0,Math.PI*2);ctx.fill();
    }
  }

  ctx.restore(); // 结束裁剪

  // === 画窗框（只画四边边框，不覆盖玻璃区域） ===
  // 白色窗框 - 四条边分别画
  ctx.fillStyle='#fff';
  ctx.fillRect(wx-5,wy-5,ww+10,8);    // 上边
  ctx.fillRect(wx-5,wy+wh-3,ww+10,8); // 下边
  ctx.fillRect(wx-5,wy-5,8,wh+10);    // 左边
  ctx.fillRect(wx+ww-3,wy-5,8,wh+10); // 右边
  // 外框线
  ctx.strokeStyle='#d4c0a8';ctx.lineWidth=4;
  ctx.beginPath();ctx.roundRect(wx-4,wy-4,ww+8,wh+8,3);ctx.stroke();
  // 内框线（玻璃边缘）
  ctx.strokeStyle='#d0bfa0';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.roundRect(wx+2,wy+2,ww-4,wh-4,2);ctx.stroke();

  // === 窗户开关状态 ===
  if(openP < 0.99){
    // 窗户关闭 → 画十字格
    let alpha = 1 - openP;
    ctx.globalAlpha = alpha;
    ctx.strokeStyle='#e0cdb8';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(wx+ww/2,wy);ctx.lineTo(wx+ww/2,wy+wh);ctx.stroke();
    ctx.beginPath();ctx.moveTo(wx,wy+wh/2);ctx.lineTo(wx+ww,wy+wh/2);ctx.stroke();
    // 玻璃反光
    ctx.fillStyle=`rgba(200,220,240,${.12*alpha})`;
    ctx.fillRect(wx+2,wy+2,ww/2-4,wh/2-4);
    ctx.fillRect(wx+ww/2+2,wy+wh/2+2,ww/2-4,wh/2-4);
    ctx.globalAlpha=1;
  }

  if(openP > 0.01){
    // 窗户打开 → 画外开的窗扇（梯形透视）
    let a = openP;
    let outW = 35; // 外开宽度
    // 左扇 - 向外开，连接到左边墙
    ctx.fillStyle='#fff';ctx.strokeStyle='#c8b898';ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(wx, wy);           // 左上（窗框）
    ctx.lineTo(wx, wy+wh);        // 左下（窗框）
    ctx.lineTo(wx-outW*a, wy+wh-12*a); // 左下外
    ctx.lineTo(wx-outW*a, wy+14*a);    // 左上外
    ctx.closePath();ctx.fill();ctx.stroke();
    // 左扇玻璃
    ctx.fillStyle=`rgba(180,210,240,${.3*a})`;
    ctx.beginPath();
    ctx.moveTo(wx+3, wy+4);
    ctx.lineTo(wx+3, wy+wh-4);
    ctx.lineTo(wx-outW*a+4, wy+wh-16*a);
    ctx.lineTo(wx-outW*a+4, wy+18*a);
    ctx.closePath();ctx.fill();

    // 右扇 - 向外开
    ctx.fillStyle='#fff';ctx.strokeStyle='#c8b898';ctx.lineWidth=2;
    ctx.beginPath();
    ctx.moveTo(wx+ww, wy);
    ctx.lineTo(wx+ww, wy+wh);
    ctx.lineTo(wx+ww+outW*a, wy+wh-12*a);
    ctx.lineTo(wx+ww+outW*a, wy+14*a);
    ctx.closePath();ctx.fill();ctx.stroke();
    // 右扇玻璃
    ctx.fillStyle=`rgba(180,210,240,${.3*a})`;
    ctx.beginPath();
    ctx.moveTo(wx+ww-3, wy+4);
    ctx.lineTo(wx+ww-3, wy+wh-4);
    ctx.lineTo(wx+ww+outW*a-4, wy+wh-16*a);
    ctx.lineTo(wx+ww+outW*a-4, wy+18*a);
    ctx.closePath();ctx.fill();

    // 窗扇上的横梁（跟随外开）
    ctx.strokeStyle='#d0c0a8';ctx.lineWidth=1.2;
    let lmx=wx-outW*a/2, lmy=wy+wh/2-2*a;
    ctx.beginPath();ctx.moveTo(wx+2,wy+wh/2);ctx.lineTo(lmx,lmy);ctx.stroke();
    ctx.beginPath();ctx.moveTo(wx+ww-2,wy+wh/2);ctx.lineTo(wx+ww+outW*a/2,lmy);ctx.stroke();
  }

  // --- 窗帘 (丰富样式+颜色) ---
  let cc=R.curtC, wave=Math.sin(T*.015)*3;

  if(R.curtS==='elegant'){
    ctx.fillStyle=cc;
    ctx.beginPath();ctx.moveTo(wx-14,wy-20);ctx.quadraticCurveTo(wx+ww*.22+wave,wy+wh*.3,wx+ww*.13,wy+wh*.6);ctx.quadraticCurveTo(wx+ww*.09,wy+wh+10,wx+4,wy+wh+5);ctx.lineTo(wx-14,wy+wh+5);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(wx+ww+14,wy-20);ctx.quadraticCurveTo(wx+ww*.78-wave,wy+wh*.3,wx+ww*.87,wy+wh*.6);ctx.quadraticCurveTo(wx+ww*.91,wy+wh+10,wx+ww-4,wy+wh+5);ctx.lineTo(wx+ww+14,wy+wh+5);ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.05)';ctx.lineWidth=.6;
    for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(wx-2+i*14,wy-5);ctx.quadraticCurveTo(wx+i*14,wy+wh*.5,wx-1+i*14,wy+wh);ctx.stroke();}
    for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(wx+ww-40+i*14,wy-5);ctx.quadraticCurveTo(wx+ww-26+i*14,wy+wh*.5,wx+ww-38+i*14,wy+wh);ctx.stroke();}
  }else if(R.curtS==='lace'){
    ctx.fillStyle=cc;ctx.globalAlpha=.85;
    ctx.beginPath();ctx.moveTo(wx-10,wy-16);
    for(let y=wy-10;y<wy+wh+10;y+=8)ctx.lineTo(wx-10+Math.sin(y*.08)*4,y);
    ctx.lineTo(wx+16,wy+wh+8);ctx.lineTo(wx-10,wy+wh+8);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(wx+ww+10,wy-16);
    for(let y=wy-10;y<wy+wh+10;y+=8)ctx.lineTo(wx+ww+10+Math.sin(y*.08)*4,y);
    ctx.lineTo(wx+ww-16,wy+wh+8);ctx.lineTo(wx+ww+10,wy+wh+8);ctx.closePath();ctx.fill();
    ctx.globalAlpha=1;
    // 蕾丝花纹
    ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=.7;
    for(let y=wy;y<wy+wh;y+=18){
      ctx.beginPath();ctx.arc(wx+8,y,5,Math.PI*1.5,Math.PI*.5);ctx.stroke();
      ctx.beginPath();ctx.arc(wx+ww-8,y,5,Math.PI*.5,Math.PI*1.5);ctx.stroke();
    }
  }else if(R.curtS==='velvet'){
    let vg=ctx.createLinearGradient(0,wy-20,0,wy+wh+5);
    vg.addColorStop(0,cc);vg.addColorStop(.4,lighten(cc,.04));vg.addColorStop(1,darken(cc,.08));
    ctx.fillStyle=vg;
    ctx.fillRect(wx-8,wy-18,22,wh+20);ctx.fillRect(wx+ww-14,wy-18,22,wh+20);
    ctx.strokeStyle='rgba(0,0,0,.08)';ctx.lineWidth=1;
    ctx.strokeRect(wx-8,wy-18,22,wh+20);ctx.strokeRect(wx+ww-14,wy-18,22,wh+20);
    // 束带
    ctx.fillStyle='#d4a574';ctx.fillRect(wx-10,wy+wh*.5,26,5);ctx.fillRect(wx+ww-16,wy+wh*.5,26,5);
  }else if(R.curtS==='roman'){
    ctx.fillStyle=cc;
    for(let j=0;j<5;j++){
      let ry=wy+5+j*38;
      ctx.fillRect(wx-6,ry,16,12);
      ctx.fillRect(wx+ww-10,ry,16,12);
    }
    ctx.fillStyle=lighten(cc,.05);
    let rh=wh/6;
    for(let j=0;j<6;j++){
      ctx.beginPath();ctx.roundRect(wx-6,wy+j*rh,16,rh-4,3);ctx.fill();
      ctx.beginPath();ctx.roundRect(wx+ww-10,wy+j*rh,16,rh-4,3);ctx.fill();
    }
  }else if(R.curtS==='tie'){
    ctx.fillStyle=cc;ctx.fillRect(wx-12,wy-18,18,wh+20);ctx.fillRect(wx+ww-6,wy-18,18,wh+20);
    ctx.fillStyle='#ffe0b2';ctx.fillRect(wx-12,wy+wh*.48,18,7);ctx.fillRect(wx+ww-6,wy+wh*.48,18,7);
  }
  // 帷幔（所有样式通用）
  ctx.fillStyle=lighten(cc,.07);
  ctx.beginPath();ctx.moveTo(wx-16,wy-18);ctx.quadraticCurveTo(wx+ww*.15,wy-6,wx+ww*.28,wy-18);ctx.quadraticCurveTo(wx+ww*.5,wy-3,wx+ww*.72,wy-18);ctx.quadraticCurveTo(wx+ww*.85,wy-6,wx+ww+16,wy-18);ctx.lineTo(wx+ww+16,wy+2);ctx.quadraticCurveTo(wx+ww/2,wy+8,wx-16,wy+2);ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(200,140,150,.35)';ctx.lineWidth=1;
  ctx.beginPath();for(let x=wx-13;x<wx+ww+13;x+=10)ctx.arc(x,wy-13,5,Math.PI,0);ctx.stroke();
}

// ============ 吊灯 ============
function drawLight(){
  let cx=450,cy=67;
  if(R.lightS==='none'){
    ctx.fillStyle='#ffe8d0';ctx.beginPath();ctx.arc(cx,cy+4,22,Math.PI,0);ctx.fill();
    let g=ctx.createRadialGradient(cx,cy+8,6,cx,cy+8,55);
    g.addColorStop(0,'rgba(255,220,180,.18)');g.addColorStop(1,'rgba(255,220,180,0)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy+8,55,0,Math.PI*2);ctx.fill();
    return;
  }
  ctx.strokeStyle='#c4a090';ctx.lineWidth=1.3;ctx.beginPath();ctx.moveTo(cx,0);ctx.lineTo(cx,cy);ctx.stroke();
  if(R.lightS==='crystal'){
    ctx.fillStyle='#ffe0b2';ctx.beginPath();ctx.arc(cx,cy+5,18,Math.PI,0);ctx.fill();
    ctx.strokeStyle='#d4a574';ctx.lineWidth=1.8;ctx.stroke();
    for(let i=0;i<5;i++){
      let a=-Math.PI*.62+(i/4)*Math.PI*.62,ax=cx+Math.cos(a)*16,ay=cy+9+Math.sin(a)*11;
      ctx.strokeStyle='#d4a574';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(cx,cy+5);ctx.lineTo(ax,ay);ctx.stroke();
      ctx.fillStyle='#fef0f0';ctx.beginPath();ctx.moveTo(ax-5,ay);ctx.quadraticCurveTo(ax,ay-10,ax+5,ay);ctx.closePath();ctx.fill();
      let ga=.1+Math.sin(T*.04+i)*.04,gl=ctx.createRadialGradient(ax,ay,1,ax,ay,22);
      gl.addColorStop(0,`rgba(255,220,180,${ga*2})`);gl.addColorStop(1,'rgba(255,220,180,0)');
      ctx.fillStyle=gl;ctx.beginPath();ctx.arc(ax,ay,22,0,Math.PI*2);ctx.fill();
    }
    ctx.fillStyle='rgba(255,238,248,.7)';
    for(let i=0;i<7;i++){let dx=cx-15+i*5;ctx.beginPath();ctx.moveTo(dx,cy+18);ctx.lineTo(dx+2,cy+26);ctx.lineTo(dx-2,cy+26);ctx.closePath();ctx.fill();}
  }else if(R.lightS==='flower'){
    for(let i=0;i<5;i++){
      let a=-Math.PI*.55+(i/4)*Math.PI*.55,ax=cx+Math.cos(a)*14,ay=cy+11+Math.sin(a)*9;
      ctx.strokeStyle='#ccc';ctx.lineWidth=.8;ctx.beginPath();ctx.moveTo(cx,cy+5);ctx.lineTo(ax,ay);ctx.stroke();
      miniFlower(ax,ay,9,R.flowerC==='pink'?'#ffb3ba':R.flowerC==='red'?'#e63946':R.flowerC==='purple'?'#ce93d8':'#ffb3ba');
    }
    miniFlower(cx,cy+5,11,R.flowerC==='pink'?'#ffb3ba':R.flowerC==='red'?'#e63946':R.flowerC==='purple'?'#ce93d8':'#ffb3ba');
  }else if(R.lightS==='modern'){
    ctx.fillStyle='#1a1a1a';ctx.fillRect(cx-38,cy+3,76,8);
    for(let i=0;i<3;i++){
      let lx=cx-22+i*22;
      ctx.fillStyle='#ffe0b2';ctx.fillRect(lx-8,cy+11,16,5);
      let g=ctx.createRadialGradient(lx,cy+18,2,lx,cy+18,26);
      g.addColorStop(0,'rgba(255,220,180,.18)');g.addColorStop(1,'rgba(255,220,180,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(lx,cy+18,26,0,Math.PI*2);ctx.fill();
    }
  }
}

// ============ 3D立体横放床 ============
function drawBed(){
  let bx=570,by=FL;
  let bw=240, bh=130, bd=35; // width(x), depth(y), height
  let topY=by-bd; // mattress top

  // 地面阴影
  ctx.fillStyle='rgba(0,0,0,.1)';
  ctx.beginPath();ctx.ellipse(bx,by+6,bw/2+14,12,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(0,0,0,.05)';
  ctx.beginPath();ctx.ellipse(bx,by+4,bw/2+18,10,0,0,Math.PI*2);ctx.fill();

  // ---- 床架 (3D感) ----
  // 床头板
  let hc={romantic:'#d4a0a0',classic:'#d4b896',vintage:'#a07050',modern:'#b0a8a0',princess:'#e8c0c8'};
  let hcl=hc[R.bedS]||hc.romantic;
  // 床头板3D
  ctx.fillStyle=hcl;
  ctx.beginPath();
  ctx.moveTo(bx-bw/2-8,by-bd-55);// 左上
  ctx.lineTo(bx+bw/2+8,by-bd-55);// 右上
  ctx.lineTo(bx+bw/2+4,by-bd-10);// 右下前
  ctx.lineTo(bx-bw/2-4,by-bd-10);// 左下前
  ctx.closePath();ctx.fill();
  // 床头板顶部弧线
  ctx.fillStyle=lighten(hcl,.08);
  ctx.beginPath();ctx.moveTo(bx-bw/2-6,by-bd-53);
  ctx.quadraticCurveTo(bx,by-bd-75,bx+bw/2+6,by-bd-53);

function updWeatherParticles(){
  if(R.weather==='rainy'&&(R.winOpen||true)){

  }
  if(R.weather==='snowy'){
    snowFlakes.forEach(s=>{s.y+=s.vy;s.x+=s.vx+s.sw*.5;s.sw+=.01;if(s.y>H||s.x<0||s.x>W){s.y=-20;s.x=Math.random()*W;s.vy=.4+Math.random()*.8;s.vx=(Math.random()-.5)*.5;}});

  }
}

        ctx.fillStyle=`rgba(255,255,255,${.5+s.sw*.3})`;
        ctx.beginPath();ctx.arc(s.x,s.y,s.s,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle='rgba(200,210,230,.3)';ctx.lineWidth=.4;
        ctx.beginPath();ctx.moveTo(s.x-s.s*1.3,s.y);ctx.lineTo(s.x+s.s*1.3,s.y);ctx.moveTo(s.x,s.y-s.s*1.3);ctx.lineTo(s.x,s.y+s.s*1.3);ctx.stroke();
      }
    });
  }
}

// ============ 粒子更新/渲染 ============
function updParticles(){
  T++;
  pt.forEach(p=>{p.y+=p.sp;p.sw+=p.swS;p.x+=Math.sin(p.sw)*p.swA;p.r+=p.rS;if(p.y>H+30){p.y=-20;p.x=Math.random()*W;}});
  sp.forEach(s=>{s.tw+=s.twS;s.life-=s.decay;if(s.life<=0){s.life=1;s.x=Math.random()*W;s.y=Math.random()*H*.45;}});
  hr.forEach(h=>{h.y+=h.vy;h.x+=h.vx;h.r+=h.rS;h.life-=h.decay;});hr=hr.filter(h=>h.life>0);
  fx.forEach(f=>{f.x+=f.vx;f.y+=f.vy;f.life-=.025;f.s*=.98;});fx=fx.filter(f=>f.life>0);
  ds.forEach(d=>{d.y+=d.vy;d.sw+=.01;d.x+=Math.sin(d.sw)*.15;if(d.y<0)d.y=H;if(d.y>H)d.y=0;});
  updWeatherParticles();
}
function drawParticles(){
  ds.forEach(d=>{ctx.fillStyle=`rgba(255,220,200,${d.a})`;ctx.beginPath();ctx.arc(d.x,d.y,d.s,0,Math.PI*2);ctx.fill();});
  sp.forEach(s=>{let a=(.25+Math.sin(s.tw)*.6)*s.life;ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.beginPath();ctx.arc(s.x,s.y,s.s,0,Math.PI*2);ctx.fill();ctx.strokeStyle=`rgba(255,255,255,${a*.3})`;ctx.lineWidth=.3;ctx.beginPath();ctx.moveTo(s.x-s.s*2,s.y);ctx.lineTo(s.x+s.s*2,s.y);ctx.moveTo(s.x,s.y-s.s*2);ctx.lineTo(s.x,s.y+s.s*2);ctx.stroke();});
  pt.forEach(p=>{ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.r);ctx.globalAlpha=p.a;ctx.fillStyle=p.c;ctx.beginPath();ctx.ellipse(0,0,p.s,p.s*.52,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(255,255,255,.22)';ctx.beginPath();ctx.arc(-p.s*.12,-p.s*.08,p.s*.18,0,Math.PI*2);ctx.fill();ctx.restore();});
  hr.forEach(h=>{ctx.save();ctx.translate(h.x,h.y);ctx.rotate(h.r);ctx.globalAlpha=h.life;ctx.fillStyle=h.c;let s=h.s;ctx.beginPath();ctx.moveTo(0,s*.35);ctx.bezierCurveTo(0,-s*.4,-s,-s*.5,-s,s*.2);ctx.bezierCurveTo(-s,s*.8,0,s,0,s);ctx.bezierCurveTo(0,s,s,s*.8,s,s*.2);ctx.bezierCurveTo(s,-s*.5,0,-s*.4,0,s*.35);ctx.fill();ctx.restore();});
  fx.forEach(f=>{ctx.globalAlpha=f.life;ctx.fillStyle=f.c;ctx.beginPath();ctx.arc(f.x,f.y,f.s,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;
  drawWeatherParticles();
}

function loop(){updParticles();ctx.clearRect(0,0,W,H);drawRoom();drawParticles();requestAnimationFrame(loop);}

function drawDongtingChar(ctx,cx,cy,s){
  ctx.save();ctx.translate(cx,cy);ctx.scale(s,s);

  // === 阴影 ===
  ctx.fillStyle='rgba(0,0,0,.08)';ctx.beginPath();ctx.ellipse(0,0,28,7,0,0,Math.PI*2);ctx.fill();

  let o=getOutfit();

  let btmC=o.btm.btmC,btmS=o.btm.btmS;
  let shC=o.sh.shC,shS=o.sh.shS;

  // === 腿 ===
  ctx.fillStyle='#fef2e8';
  ctx.beginPath();ctx.roundRect(-8,-48,7,26,3);ctx.fill();
  ctx.beginPath();ctx.roundRect(2,-48,7,26,3);ctx.fill();

  // === 鞋子 ===
  function sh(ox,oy){
    ctx.fillStyle=shC;

    else if(shS==='ballet'){ctx.beginPath();ctx.ellipse(ox+1,oy,6,3,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffe0c0';ctx.beginPath();ctx.arc(ox+2,oy-3,2,0,Math.PI*2);ctx.fill();}
    else if(shS==='sandals'){ctx.fillRect(ox-2,oy-4,5,3);ctx.beginPath();ctx.ellipse(ox+1,oy+1,6,2.5,0,0,Math.PI*2);ctx.fill();}

    ctx.beginPath();ctx.moveTo(3,-35);ctx.lineTo(5,-2);ctx.lineTo(16,-2);ctx.lineTo(11,-35);ctx.closePath();ctx.fill();

    // 虹膜
    let ig=ctx.createRadialGradient(ex-1,ey+1,1,ex,ey,7);
    ig.addColorStop(0,'#5a3a4a');ig.addColorStop(.6,'#3a1a2a');ig.addColorStop(1,'#1a0a1a');
    ctx.fillStyle=ig;ctx.beginPath();ctx.arc(ex,ey,6.5,0,Math.PI*2);ctx.fill();
    // 瞳孔
    ctx.fillStyle='#0a0a0a';ctx.beginPath();ctx.arc(ex,ey,3,0,Math.PI*2);ctx.fill();
    // 高光
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ex-2,ey-3,2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(ex+2,ey-1,1.2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.7)';ctx.beginPath();ctx.arc(ex-3,ey-5,1,0,Math.PI*2);ctx.fill();
    // 睫毛
    ctx.strokeStyle='#3a1a2a';ctx.lineWidth=2.2;
    ctx.beginPath();ctx.arc(ex,ey-2,9.5,Math.PI*.15,Math.PI*.85);ctx.stroke();
  }
  drawEye(-8,-100);drawEye(8,-100);

  // 眉毛
  ctx.strokeStyle='#5a3a3a';ctx.lineWidth=1.6;
  ctx.beginPath();ctx.moveTo(-15,-112);ctx.quadraticCurveTo(-8,-116,-2,-113);ctx.stroke();
  ctx.beginPath();ctx.moveTo(2,-113);ctx.quadraticCurveTo(8,-116,15,-112);ctx.stroke();

  // 鼻子
  ctx.fillStyle='rgba(255,180,160,.5)';ctx.beginPath();ctx.arc(0,-94,1.8,0,Math.PI*2);ctx.fill();
  // 鼻尖高光
  ctx.fillStyle='rgba(255,255,255,.3)';ctx.beginPath();ctx.arc(-.5,-95,1,0,Math.PI*2);ctx.fill();

  // 嘴巴 - 微笑
  ctx.strokeStyle='#e89090';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(0,-88.5,5.5,.15,Math.PI*.85);ctx.stroke();
  ctx.fillStyle='#f8a0a0';ctx.beginPath();ctx.arc(0,-86.5,2.5,Math.PI*.15,Math.PI*.85);ctx.fill();

  // === 前发/刘海 ===
  ctx.fillStyle='#3a1a28';
  ctx.beginPath();ctx.moveTo(-19,-108);
  ctx.quadraticCurveTo(-15,-118,-2,-120);
  ctx.quadraticCurveTo(8,-121,18,-110);
  ctx.quadraticCurveTo(22,-105,20,-100);
  ctx.quadraticCurveTo(16,-97,10,-98);
  ctx.quadraticCurveTo(4,-95,-2,-97);
  ctx.quadraticCurveTo(-10,-96,-16,-100);
  ctx.quadraticCurveTo(-22,-100,-19,-108);
  ctx.closePath();ctx.fill();
  // 刘海层次
  ctx.fillStyle='#4a2535';
  ctx.beginPath();ctx.moveTo(-8,-119);ctx.quadraticCurveTo(0,-122,6,-118);
  ctx.quadraticCurveTo(10,-116,14,-108);ctx.quadraticCurveTo(6,-112,-6,-112);
  ctx.quadraticCurveTo(-12,-110,-8,-119);ctx.closePath();ctx.fill();

  // 侧发
  ctx.fillStyle='#3a1a28';
  ctx.beginPath();ctx.ellipse(-19,-96,5,16,-.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(19,-96,5,16,.3,0,Math.PI*2);ctx.fill();
  // 发尾
  ctx.beginPath();ctx.moveTo(-18,-82);ctx.quadraticCurveTo(-14,-73,-10,-78);ctx.lineTo(-15,-84);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(18,-82);ctx.quadraticCurveTo(14,-73,10,-78);ctx.lineTo(15,-84);ctx.closePath();ctx.fill();

  // === 配饰 ===
  if(o.crown){
    ctx.fillStyle='#ffd700';ctx.beginPath();
    ctx.moveTo(-11,-118);ctx.lineTo(-15,-128);ctx.lineTo(-5,-121);
    ctx.lineTo(0,-132);ctx.lineTo(5,-121);ctx.lineTo(15,-128);ctx.lineTo(11,-118);
    ctx.closePath();ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,-128,2.2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff6b8a';ctx.beginPath();ctx.arc(0,-125,1.2,0,Math.PI*2);ctx.fill();
  }
  if(o.bow){
    ctx.fillStyle='#ffb3ba';ctx.beginPath();
    ctx.moveTo(-16,-115);ctx.ellipse(-10,-118,6,4.5,-.4,0,Math.PI*2);
    ctx.ellipse(10,-118,6,4.5,.4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(0,-117,2.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-2,-119,1,0,Math.PI*2);ctx.fill();
  }
  if(o.hat){
    ctx.fillStyle='#fce4ec';ctx.beginPath();ctx.ellipse(0,-115,26,7,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(0,-120,15,12,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#ffb3ba';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle='#ffb3ba';ctx.beginPath();ctx.arc(0,-121,3.5,0,Math.PI*2);ctx.fill();
  }
  if(o.glass){
    ctx.strokeStyle='#3a2a3a';ctx.lineWidth=2.2;
    ctx.beginPath();ctx.arc(-8,-100,7.5,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.arc(8,-100,7.5,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='#5a4a5a';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(1,-100);ctx.lineTo(0,-100);ctx.stroke();
  }

  ctx.restore();
}

// 衣柜镜子中的董婷
function drawMirrorDongting(){
  let mc=document.getElementById('mirrorCanvas');if(!mc)return;
  let mctx=mc.getContext('2d');let mW=180,mH=280;
  mctx.clearRect(0,0,mW,mH);
  let bg=mctx.createRadialGradient(mW/2,mH/2,30,mW/2,mH/2,160);
  bg.addColorStop(0,'#fef8fa');bg.addColorStop(1,'#f2dce4');
  mctx.fillStyle=bg;mctx.fillRect(0,0,mW,mH);
  mctx.fillStyle='#e8d0c8';mctx.fillRect(0,mH-28,mW,28);
  drawDongtingChar(mctx,mW/2,mH-16,.85);
}

function updateOOTD(){
  let el=document.getElementById('ootdDisplay');
  if(pickedOutfit.length===0)el.innerHTML='👆 选衣服吧~';
  else if(pickedOutfit.length<=2)el.innerHTML='💖 '+pickedOutfit.map(p=>p.e+p.n).join('+')+'<br>继续挑~';
  else if(pickedOutfit.length<=4)el.innerHTML='✨ '+pickedOutfit.map(p=>p.e+p.n).join('+')+'<br>好品味！';

function randomOutfit(){
  pickedOutfit=[];
  let cats=[[],[],[],[],[]];
  wardrobeItems.forEach((cat,ci)=>{cat.items.forEach(it=>cats[ci].push(it));});
  // 随机选1-2件上衣，1件下装，1双鞋，随机配饰
  let topPick=cats[0][Math.floor(Math.random()*cats[0].length)];
  let btmPick=cats[1][Math.floor(Math.random()*cats[1].length)];
  let shPick=cats[2][Math.floor(Math.random()*cats[2].length)];
  pickedOutfit.push(topPick,btmPick,shPick);
  if(Math.random()>.5){let bag=cats[3][Math.floor(Math.random()*cats[3].length)];pickedOutfit.push(bag);}
  if(Math.random()>.4){let acc=cats[4][Math.floor(Math.random()*cats[4].length)];pickedOutfit.push(acc);}
  buildWardrobe();updateOOTD();
  // 镜子闪亮
  let sp=document.getElementById('mirrorSparkle');sp.style.fontSize='36px';setTimeout(()=>sp.style.fontSize='20px',300);
}
function buildWardrobe(){
  let c=document.getElementById('wardrobeContent');c.innerHTML='';
  wardrobeItems.forEach(cat=>{
    let lbl=document.createElement('div');lbl.className='wardrobe-cat';lbl.textContent=cat.cat;c.appendChild(lbl);
    let row=document.createElement('div');row.className='wardrobe-items';
    cat.items.forEach(it=>{
      let d=document.createElement('div');d.className='wardrobe-item';
      let sel=pickedOutfit.find(p=>p.n===it.n);if(sel)d.style.cssText='background:rgba(233,30,99,.25);border-color:#e91e63;box-shadow:0 0 12px rgba(233,30,99,.25);';
      d.innerHTML=`<span class="w-emoji">${it.e}</span><span class="w-name">${it.n}</span><span class="w-color" style="background:${it.cl}"></span>`;
      d.onclick=()=>{
        let idx=pickedOutfit.findIndex(p=>p.n===it.n);

  });
  setTimeout(()=>drawMirrorDongting(),50);
}

function buildPanel(){
  document.getElementById('secLabel').textContent=cats[curTab].t;
  let a=document.getElementById('optArea');a.innerHTML='';

  oo.forEach(o=>{

      let lb=document.createElement('div');lb.style.cssText='font-size:9px;color:#666;text-align:center;margin-bottom:3px;';

      let rw=document.createElement('div');rw.className='color-row';
      o.cs.forEach(cl=>{
        let d=document.createElement('div');d.className='cdot'+(R[o.k]===cl?' sel':'');
        d.style.backgroundColor=cl;d.title=cl;
        d.onclick=()=>{R[o.k]=cl;buildPanel();};rw.appendChild(d);
      });a.appendChild(rw);
    }else if(o.t==='color_groups'){
  // 36色分5大类
      WALL_COLOR_GROUPS.forEach(g=>{
        let catLb=document.createElement('div');catLb.className='color-cat';catLb.textContent=g.name;a.appendChild(catLb);

          d.onclick=()=>{R[o.k]=cl;buildPanel();};rw.appendChild(d);
        });a.appendChild(rw);
      });
    }else if(o.t==='grid'){
      let lb=document.createElement('div');lb.style.cssText='font-size:9px;color:#666;text-align:center;margin-bottom:3px;';
      lb.textContent=o.n;a.appendChild(lb);
